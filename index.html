<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縦書きリーダー</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;800&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDE5CF;--paper2:#E4DAC1;
  --ink:#1B1508;--ink-mid:#3A3020;--ink-lt:#6B5A3E;
  --accent:#7B2E14;--div:rgba(27,21,8,0.12);
  --hdr:54px;
  --f:'Shippori Mincho B1','Noto Serif JP','Yu Mincho',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--paper);font-family:var(--f);color:var(--ink)}

#inp{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;
  position:relative;overflow:hidden;
}
#inp::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(90deg,var(--div) 0 1px,transparent 1px 88px),
    repeating-linear-gradient(0deg,var(--div) 0 1px,transparent 1px 88px);
  opacity:0.35;
}
.i-logo{
  writing-mode:vertical-rl;font-size:3.2rem;font-weight:800;
  letter-spacing:0.5em;color:var(--ink);margin-bottom:2.8rem;position:relative;
}
.i-logo::after{
  content:'';display:block;width:2px;height:100%;
  background:var(--accent);position:absolute;right:-1.2rem;top:0;
}
.i-sub{font-size:0.82rem;color:var(--ink-lt);letter-spacing:0.3em;margin-bottom:2.2rem;position:relative}
.i-wrap{
  display:flex;width:min(580px,100%);
  border:1px solid rgba(27,21,8,0.28);border-radius:2px;
  overflow:hidden;box-shadow:0 4px 32px rgba(27,21,8,0.1);
}
#url-input{
  flex:1;padding:0.9rem 1.2rem;font-family:var(--f);font-size:0.95rem;
  border:none;background:rgba(255,255,255,0.65);color:var(--ink);outline:none;min-width:0;
}
#url-input::placeholder{color:var(--ink-lt);opacity:0.5}
#go{
  padding:0 1.8rem;background:var(--ink);color:var(--paper);
  font-family:var(--f);font-size:1rem;letter-spacing:0.2em;
  border:none;cursor:pointer;transition:background 0.2s;flex-shrink:0;
}
#go:hover{background:var(--accent)}
#go:disabled{opacity:0.5;cursor:not-allowed}
#err{margin-top:1rem;color:var(--accent);font-size:0.82rem;letter-spacing:0.1em;min-height:1.4em;text-align:center;max-width:500px}

#ld{
  height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:1.4rem;
  color:var(--ink-lt);letter-spacing:0.2em;font-size:0.85rem;
}
.spin{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--div);border-top-color:var(--ink);
  animation:sp 0.75s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
#ld-msg{font-size:0.78rem;color:var(--ink-lt);letter-spacing:0.15em;min-height:1.2em}

#rd{height:100vh;display:none;flex-direction:column;overflow:hidden}
#hdr{
  height:var(--hdr);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:0 1.2rem;background:rgba(237,229,207,0.97);
  border-bottom:1px solid var(--div);z-index:10;
}
.hdr-btn{
  font-family:var(--f);font-size:0.78rem;color:var(--ink-mid);
  background:none;border:1px solid var(--div);padding:0.35rem 0.9rem;
  border-radius:2px;cursor:pointer;letter-spacing:0.12em;
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
}
.hdr-btn:hover{background:var(--paper2)}
#htitle{
  font-size:0.88rem;color:var(--ink-mid);letter-spacing:0.12em;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-align:center;
}
#pct{font-size:0.78rem;color:var(--ink-lt);min-width:34px;text-align:right;white-space:nowrap;flex-shrink:0}
#pbar{height:2px;background:var(--div);flex-shrink:0}
#pfill{height:100%;background:var(--accent);width:0%;transition:width 0.1s linear}

#ca{
  flex:1;min-height:0;min-width:0;
  writing-mode:vertical-rl;text-orientation:mixed;
  overflow-x:auto;overflow-y:hidden;
  padding:2rem 2.8rem;
  font-size:1.1rem;line-height:2.2;letter-spacing:0.05em;
  -webkit-overflow-scrolling:touch;
  background:var(--paper);
}
#ca::-webkit-scrollbar{height:6px}
#ca::-webkit-scrollbar-track{background:var(--paper2)}
#ca::-webkit-scrollbar-thumb{background:rgba(27,21,8,0.28);border-radius:3px}
#ca::-webkit-scrollbar-thumb:hover{background:rgba(27,21,8,0.45)}

/* fullscreen時もレイアウト維持 */
:fullscreen #rd, :-webkit-full-screen #rd{height:100vh}
:fullscreen body, :-webkit-full-screen body{height:100vh}

.t-block{display:inline-block;vertical-align:top;margin-left:3.5rem;padding:0 1.2rem;border-left:1px solid var(--div)}
.ep-title{font-size:1.3rem;font-weight:500;letter-spacing:0.22em;color:var(--accent);display:block}
.tx-block{display:inline-block;vertical-align:top}
.para{display:block;margin-left:1.6rem}
.para:first-child{margin-left:0}
.spacer{display:block;width:1.2rem}

/* ── 前話ブロック（小）── */
.nav-prev-block{
  display:inline-block;vertical-align:top;
  margin-left:4rem;padding:0 1.4rem;
  border-left:1px solid var(--div);
  opacity:0;transform:translateX(-10px);
  transition:opacity 0.5s,transform 0.5s;
  align-self:flex-start;
}
.nav-prev-block.vis{opacity:1;transform:translateX(0)}
.nav-prev-hd{display:block;font-size:0.68rem;color:var(--ink-lt);letter-spacing:0.22em;margin-bottom:1.2rem}
.nav-prev-a{
  display:block;color:var(--ink);text-decoration:none;
  font-size:0.88rem;letter-spacing:0.1em;writing-mode:vertical-rl;
  cursor:pointer;transition:color 0.15s;
}
.nav-prev-a:hover{color:var(--accent)}

/* ── 次話帯ボタン（大）── */
.nav-next-band{
  /* vertical-rl なので height=100%が縦全体に伸びる */
  display:inline-flex;
  flex-direction:column;
  align-items:center;justify-content:center;
  margin-left:3rem;
  width:auto;
  /* #caのheight全体を使う */
  min-height:calc(100vh - var(--hdr) - 4px);
  padding:0 1.8rem;
  background:var(--ink);
  color:var(--paper);
  cursor:pointer;
  text-decoration:none;
  border:none;
  opacity:0;transform:translateX(-16px);
  transition:opacity 0.55s,transform 0.55s,background 0.2s;
  position:relative;overflow:hidden;
}
.nav-next-band::before{
  content:'';position:absolute;inset:0;
  background:var(--accent);
  transform:scaleX(0);transform-origin:right center;
  transition:transform 0.3s ease;
}
.nav-next-band:hover::before{transform:scaleX(1);}
.nav-next-band.vis{opacity:1;transform:translateX(0)}
.nav-next-inner{
  display:flex;flex-direction:column;align-items:center;gap:1.6rem;
  position:relative;z-index:1;
}
.nav-next-label{
  writing-mode:vertical-rl;font-size:0.7rem;letter-spacing:0.35em;
  color:rgba(237,229,207,0.55);
}
.nav-next-title{
  writing-mode:vertical-rl;font-size:1.05rem;font-weight:500;
  letter-spacing:0.18em;color:var(--paper);
  max-height:60vh;overflow:hidden;text-overflow:ellipsis;
}
.nav-next-arrow{font-size:1.4rem;color:rgba(237,229,207,0.6);margin-top:0.5rem;}

ruby{ruby-align:center}rt{font-size:0.52em}
</style>
</head>
<body>

<div id="inp">
  <div class="i-logo">縦書</div>
  <p class="i-sub">縦 書 き リ ー ダ ー</p>
  <div class="i-wrap">
    <input type="url" id="url-input" placeholder="URL を入力してください…" autocomplete="url" spellcheck="false"/>
    <button id="go">読 む</button>
  </div>
  <p id="err"></p>
</div>

<div id="ld">
  <div class="spin"></div>
  <span>読み込み中…</span>
  <span id="ld-msg"></span>
</div>

<div id="rd">
  <div id="hdr">
    <button class="hdr-btn" id="bk">← 戻る</button>
    <div id="htitle"></div>
    <div id="pct">0%</div>
    <button class="hdr-btn" id="fsBtn" title="全画面">⛶</button>
  </div>
  <div id="pbar"><div id="pfill"></div></div>
  <div id="ca"></div>
</div>

<script>
const $inp=document.getElementById('inp'),
      $ld=document.getElementById('ld'),
      $rd=document.getElementById('rd'),
      $urlInput=document.getElementById('url-input'),
      $go=document.getElementById('go'),
      $err=document.getElementById('err'),
      $ca=document.getElementById('ca'),
      $ht=document.getElementById('htitle'),
      $pf=document.getElementById('pfill'),
      $pct=document.getElementById('pct'),
      $bk=document.getElementById('bk'),
      $fsBtn=document.getElementById('fsBtn'),
      $ldMsg=document.getElementById('ld-msg');

let scrollHandler=null;

function show(el){[$inp,$ld,$rd].forEach(e=>{e.style.display='none'});el.style.display='flex';}
function cleanupReader(){
  if(scrollHandler){$ca.removeEventListener('scroll',scrollHandler);scrollHandler=null;}
  $ca.innerHTML='';$pf.style.width='0%';$pct.textContent='0%';
}

$bk.addEventListener('click',()=>{show($inp);cleanupReader();});
$urlInput.addEventListener('keydown',e=>{if(e.key==='Enter')$go.click();});
$go.addEventListener('click',()=>{
  const u=$urlInput.value.trim();
  if(!u){$err.textContent='URLを入力してください';return;}
  if(!/^https?:\/\//i.test(u)){$err.textContent='https:// で始まるURLを入力してください';return;}
  $err.textContent='';load(u);
});

// ── 全画面 ──
$fsBtn.addEventListener('click',()=>{
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);
  }else{
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);
  }
});
document.addEventListener('fullscreenchange',updateFsBtn);
document.addEventListener('webkitfullscreenchange',updateFsBtn);
function updateFsBtn(){
  const fs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  $fsBtn.textContent=fs?'✕ 全画面':'⛶';
  $fsBtn.title=fs?'全画面を終了':'全画面表示';
}

// ── Fetch ──
async function proxyFetch(url,timeout=12000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();
    if(t.length<300)throw new Error('too short');
    return t;
  }finally{clearTimeout(tid);}
}
async function jsonProxyFetch(url,timeout=12000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const t=j&&(j.contents||j.body||j.data||'');
    if(!t||t.length<300)throw new Error('too short');
    return t;
  }finally{clearTimeout(tid);}
}
function makeProxies(u){
  const enc=encodeURIComponent(u);
  return[
    ()=>jsonProxyFetch(`https://api.allorigins.win/get?url=${enc}`),
    ()=>proxyFetch(`https://api.allorigins.win/raw?url=${enc}`),
    ()=>proxyFetch(`https://corsproxy.io/?url=${enc}`),
    ()=>proxyFetch(`https://api.codetabs.com/v1/proxy?quest=${enc}`),
    ()=>proxyFetch(`https://thingproxy.freeboard.io/fetch/${u}`),
    ()=>proxyFetch(`https://proxy.cors.sh/${u}`),
    ()=>proxyFetch(`https://cors-proxy.fringe.zone/${u}`),
  ];
}
async function fetchHtml(u){
  return await Promise.any(makeProxies(u).map(fn=>fn()));
}

let ldInterval=null;
function startLoadingAnim(){
  const msgs=['接続中…','サーバーに問い合わせ中…','もう少しお待ちください…','取得中…'];
  let i=0;$ldMsg.textContent=msgs[0];
  ldInterval=setInterval(()=>{i=(i+1)%msgs.length;$ldMsg.textContent=msgs[i];},2200);
}
function stopLoadingAnim(){if(ldInterval){clearInterval(ldInterval);ldInterval=null;$ldMsg.textContent='';}}

async function load(u){
  cleanupReader();show($ld);$go.disabled=true;startLoadingAnim();
  try{
    const html=await fetchHtml(u);
    stopLoadingAnim();parse(html,u);
  }catch(e){
    stopLoadingAnim();show($inp);
    $err.textContent='読み込みに失敗しました。対象サイトがプロキシをブロックしている可能性があります。';
    console.error('[縦書き]',e);
  }finally{$go.disabled=false;}
}

// ── URL解決 ──
function resolveUrl(href,inputUrl,origin){
  if(!href)return null;
  href=href.trim();
  if(!href||href==='#'||/^javascript/i.test(href)||/^mailto/i.test(href))return null;
  if(href.startsWith('//'))return 'https:'+href;
  if(href.startsWith('/'))return origin+href;
  if(/^https?:\/\//i.test(href))return href;
  try{return new URL(href,inputUrl).href;}catch(_){return null;}
}

// ── Parse & Render ──
function parse(html,inputUrl){
  const doc=new DOMParser().parseFromString(html,'text/html');
  let origin='';
  try{origin=new URL(inputUrl).origin;}catch(_){}

  // タイトル
  const titleEl=
    doc.querySelector('.contentMain-pagerEpisodeTitle')||
    doc.querySelector('[class*="pagerEpisodeTitle"]')||
    doc.querySelector('[class*="episodeTitle"]')||
    doc.querySelector('h1');
  const titleTxt=titleEl?titleEl.textContent.trim():'';

  // 本文 #p1, #p2, …
  const paras=[];
  for(let i=1;i<99999;i++){
    const p=doc.getElementById('p'+i);
    if(!p)break;
    p.querySelectorAll('script,style,noscript,iframe').forEach(x=>x.remove());
    p.querySelectorAll('*').forEach(el=>{
      [...el.attributes].forEach(a=>{if(a.name.startsWith('on'))el.removeAttribute(a.name);});
    });
    paras.push(p.innerHTML.trim());
  }

  // ── ナビリンク収集 ──
  // URL正規化（末尾スラッシュ・クエリ除去して比較）
  function normUrl(u){try{const x=new URL(u);return x.origin+x.pathname.replace(/\/$/,'');}catch(_){return u;}}
  const currentNorm=normUrl(inputUrl);
  const seenU=new Set([currentNorm]);
  const prevLinks=[], nextLinks=[], otherLinks=[];

  doc.querySelectorAll('a[href]').forEach(a=>{
    const href=(a.getAttribute('href')||'').trim();
    const resolved=resolveUrl(href,inputUrl,origin);
    if(!resolved)return;

    // 同オリジンチェック
    let sameOrigin=false;
    try{sameOrigin=new URL(resolved).origin===origin;}catch(_){}
    if(!sameOrigin)return;

    // 現在ページと同一URLは除外
    if(seenU.has(normUrl(resolved)))return;

    // ナビ系かどうか判定（クラス・パス）
    const inNavEl=!!a.closest(
      '[class*="nav"],[class*="pager"],[class*="prev"],[class*="next"],'
      +'[class*="episode"],[class*="chapter"],[class*="footer"],[class*="link"],'
      +'[id*="nav"],[id*="pager"],[id*="prev"],[id*="next"]'
    );
    const hasNavPath=/\/(works|episodes?|novel|chapter|ep|story|viewer|parts?)\b/i.test(resolved);
    if(!inNavEl&&!hasNavPath)return;

    // 前/次の方向をクラス名・aria・テキストから判定
    const cls=(a.className||'')+(a.getAttribute('aria-label')||'');
    const allText=a.textContent;
    const checkStr=cls+' '+allText;
    const isPrev=/前|previous|prev(?!iew)\b/i.test(checkStr);
    const isNext=/次|forward|next\b/i.test(checkStr);

    // 表示タイトルを取得: title/name系の子要素を優先、なければ全テキスト
    let displayTxt='';
    // 「次のエピソード」「前のエピソード」等のラベル要素を除いたタイトル要素を探す
    const titleChild=a.querySelector(
      '[class*="title"],[class*="name"],[class*="subject"],[class*="caption"]'
    );
    if(titleChild){
      displayTxt=titleChild.textContent.trim();
    }
    // タイトル子要素がなければ全テキストをクリーニング
    if(!displayTxt){
      // ラベル系テキスト（「次のエピソード」「前へ」等）を除去して残りをタイトルとして扱う
      const clone=a.cloneNode(true);
      clone.querySelectorAll('[class*="text"],[class*="label"],[class*="direction"],[class*="icon"],[class*="arrow"]')
        .forEach(x=>{
          const t=x.textContent.trim();
          if(/^(前|次|prev|next|previous|forward|←|→|◀|▶|へ|話|章|回|のエピソード)/i.test(t))x.remove();
        });
      displayTxt=clone.textContent.trim().slice(0,80);
    }
    // それでも空ならリンク全体のテキストをそのまま使う（短くする）
    if(!displayTxt) displayTxt=allText.trim().slice(0,60);
    if(!displayTxt) return;

    // 現在のエピソードタイトルと同一なら除外
    if(titleTxt&&displayTxt===titleTxt)return;

    seenU.add(normUrl(resolved));

    if(isPrev) prevLinks.push({txt:displayTxt,url:resolved});
    else if(isNext) nextLinks.push({txt:displayTxt,url:resolved});
    else otherLinks.push({txt:displayTxt,url:resolved});
  });

  // 描画
  $ca.innerHTML='';$ht.textContent=titleTxt||'—';

  if(titleTxt){
    const tb=document.createElement('div');tb.className='t-block';
    tb.innerHTML=`<span class="ep-title">${esc(titleTxt)}</span>`;
    $ca.appendChild(tb);
  }

  const txb=document.createElement('div');txb.className='tx-block';
  if(paras.length===0){
    const p=document.createElement('p');p.className='para';p.style.color='var(--ink-lt)';
    p.textContent='本文（#p1, #p2…）が見つかりませんでした。';txb.appendChild(p);
  }else{
    paras.forEach(h=>{
      const plain=h.replace(/<[^>]+>/g,'').trim();
      if(!plain||plain==='　'){
        const sp=document.createElement('span');sp.className='spacer';txb.appendChild(sp);
      }else{
        const p=document.createElement('p');p.className='para';p.innerHTML=h;txb.appendChild(p);
      }
    });
  }
  $ca.appendChild(txb);

  // ── ナビ描画 ──
  function makeVisible(el){
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){el.classList.add('vis');obs.disconnect();}});
    },{root:$ca,threshold:0.05});
    obs.observe(el);
  }

  // 前話ブロック（小さいテキストリスト）
  if(prevLinks.length>0){
    const pb=document.createElement('div');pb.className='nav-prev-block';
    const phd=document.createElement('span');phd.className='nav-prev-hd';phd.textContent='◀ 前話';
    pb.appendChild(phd);
    prevLinks.forEach(({txt,url})=>{
      const a=document.createElement('a');a.className='nav-prev-a';
      a.textContent=txt;a.href='#';
      a.addEventListener('click',e=>{e.preventDefault();$urlInput.value=url;load(url);});
      pb.appendChild(a);
    });
    $ca.appendChild(pb);
    makeVisible(pb);
  }

  // 次話帯ボタン（高さ全体の大バナー）
  const nextTargets=nextLinks.length>0?nextLinks:otherLinks.slice(0,1);
  if(nextTargets.length>0){
    nextTargets.forEach(({txt,url})=>{
      const band=document.createElement('a');band.className='nav-next-band';
      band.href='#';
      const inner=document.createElement('div');inner.className='nav-next-inner';
      const lbl=document.createElement('span');lbl.className='nav-next-label';lbl.textContent='次のエピソード';
      const title=document.createElement('span');title.className='nav-next-title';title.textContent=txt;
      const arrow=document.createElement('span');arrow.className='nav-next-arrow';arrow.textContent='◁';
      inner.appendChild(lbl);inner.appendChild(title);inner.appendChild(arrow);
      band.appendChild(inner);
      band.addEventListener('click',e=>{e.preventDefault();$urlInput.value=url;load(url);});
      $ca.appendChild(band);
      makeVisible(band);
    });
  } else if(prevLinks.length===0&&otherLinks.length>0){
    // 前/次の判別ができなかった場合は小さいリストで表示
    const ob=document.createElement('div');ob.className='nav-prev-block';
    const ohd=document.createElement('span');ohd.className='nav-prev-hd';ohd.textContent='関連エピソード';
    ob.appendChild(ohd);
    otherLinks.slice(0,5).forEach(({txt,url})=>{
      const a=document.createElement('a');a.className='nav-prev-a';
      a.textContent=txt;a.href='#';
      a.addEventListener('click',e=>{e.preventDefault();$urlInput.value=url;load(url);});
      ob.appendChild(a);
    });
    $ca.appendChild(ob);
    makeVisible(ob);
  }

  show($rd);
  requestAnimationFrame(()=>{$ca.scrollLeft=$ca.scrollWidth;updateProg();});
  scrollHandler=()=>updateProg();
  $ca.addEventListener('scroll',scrollHandler,{passive:true});
}

// 子要素のテキストを除いた直接テキストだけ取得
function getDirectText(el){
  let t='';
  el.childNodes.forEach(n=>{if(n.nodeType===3)t+=n.textContent;});
  return t;
}

function updateProg(){
  const sl=$ca.scrollLeft,sw=$ca.scrollWidth,cw=$ca.clientWidth;
  const max=sw-cw;
  if(max<=0){$pf.style.width='100%';$pct.textContent='100%';return;}
  const pv=Math.min(100,Math.max(0,Math.round(((max-sl)/max)*100)));
  $pf.style.width=pv+'%';$pct.textContent=pv+'%';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
